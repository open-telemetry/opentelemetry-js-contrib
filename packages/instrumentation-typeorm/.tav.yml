typeorm:
  - versions:
      include: ">=0.3.0 <1"
      mode: max-7
    commands: npm run test
  # typeorm@1.0.0 requires Node.js ^20.19.0 || ^22.13.0 || >=24.11.0 and
  # replaced the `sqlite` (sqlite3) driver with `better-sqlite3`.
  - versions:
      include: ">=1.0.0 <2"
      mode: max-7
    node: ">=20"
    peerDependencies: better-sqlite3@^12.0.0
    commands: npm run test
